services:
  librepost:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      TRANSLATE_PROVIDER: libretranslate
      TRANSLATE_URL: http://libretranslate:5000
    depends_on:
      - libretranslate
    restart: unless-stopped
  libretranslate:
    image: libretranslate/libretranslate:latest
    user: "0:0"
    ports:
      - "5000:5000"
    environment:
      LT_DISABLE_WEB_UI: "true"
      LT_UPDATE_MODELS: "false"
      LT_THREADS: "2"
    volumes:
      - libretranslate-models:/home/libretranslate/.local/share/argos-translate
    restart: unless-stopped

volumes:
  libretranslate-models:
